<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: linear-gradient(135deg, #C0FFEE 0%, #F4B8A5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }

  .icon-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(8px, 1.5vw, 14px);
    position: relative;
  }

  .app-icon {
    width: min(52vw, 52vh);
    height: min(52vw, 52vh);
    position: relative;
    transition: transform 0.15s ease;
  }

  .app-icon canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .app-icon.tap {
    transform: scale(0.93);
  }

  .app-name {
    font-size: clamp(11px, 3.5vw, 15px);
    font-weight: 600;
    color: #3B2110;
    letter-spacing: 0.06em;
    opacity: 0.55;
  }

  /* ripple */
  .ripple {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(1);
    width: min(52vw, 52vh);
    height: min(52vw, 52vh);
    border-radius: 50%;
    background: rgba(59, 33, 16, 0.1);
    animation: ripple 2s ease-out infinite;
    pointer-events: none;
  }
  .ripple:nth-child(2) { animation-delay: 0.5s; }
  .ripple:nth-child(3) { animation-delay: 1s; }

  @keyframes ripple {
    0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.45; }
    100% { transform: translate(-50%,-50%) scale(2.6); opacity: 0; }
  }

  /* zoom overlay */
  .zoom-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #C0FFEE 0%, #F4B8A5 100%);
    clip-path: circle(0% at 50% 50%);
    opacity: 0;
  }

  .zoom-overlay.launch {
    animation: launch 0.45s cubic-bezier(0.4, 0, 1, 1) forwards;
  }

  @keyframes launch {
    0%   { clip-path: circle(25% at 50% 50%); opacity: 1; }
    100% { clip-path: circle(120% at 50% 50%); opacity: 1; }
  }
</style>
</head>
<body>
<div class="zoom-overlay" id="overlay"></div>

<div class="icon-wrap" id="wrap">
  <div style="position:relative">
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="app-icon" id="iconWrap">
      <canvas id="iconCanvas"></canvas>
    </div>
  </div>
  <div class="app-name">Va Bien</div>
</div>

<script>
  const overlay = document.getElementById('overlay');
  const wrap    = document.getElementById('wrap');

  // Remove mint background from icon
  const img = new Image();
  img.src = '/img/vabien-icon.png';
  img.onload = () => {
    const canvas = document.getElementById('iconCanvas');
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const d = data.data;
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      // remove mint (#C0FFEE = 192,255,238) with tolerance
      if (r > 160 && g > 230 && b > 210 && r < 220 && g === 255) {
        d[i+3] = 0;
      }
    }
    ctx.putImageData(data, 0, 0);
  };

  const icon = wrap.querySelector('.app-icon');

  function run() {
    overlay.classList.remove('launch');
    overlay.style.opacity = '0';
    wrap.style.opacity = '1';
    icon.classList.remove('tap');

    // tap press
    setTimeout(() => {
      icon.classList.add('tap');
    }, 900);

    // zoom
    setTimeout(() => {
      overlay.style.opacity = '';
      overlay.classList.add('launch');

      setTimeout(() => {
        overlay.classList.remove('launch');
        overlay.style.opacity = '0';
        setTimeout(run, 250);
      }, 550);
    }, 1050);
  }

  run();
</script>
</body>
</html>
