<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #F9F3E8; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // Brand colors
  const MINT  = [192, 255, 238];
  const PINK  = [244, 184, 165];
  const BROWN = [59,  33,  16];
  const CREAM = [249, 243, 232];

  const blobs = [
    { cx: 0.2,  cy: 0.2,  r: 0.7,  color: MINT,  ax: 0.55, ay: 0.50, fx: 1.3,  fy: 0.9,  px: 0,   py: 0,   alpha: 0.85 },
    { cx: 0.8,  cy: 0.8,  r: 0.65, color: PINK,  ax: 0.50, ay: 0.55, fx: 0.7,  fy: 1.5,  px: 1.0, py: 0.5, alpha: 0.85 },
    { cx: 0.5,  cy: 0.5,  r: 0.55, color: BROWN, ax: 0.45, ay: 0.40, fx: 1.9,  fy: 1.1,  px: 2.0, py: 1.5, alpha: 0.25 },
    { cx: 0.7,  cy: 0.2,  r: 0.50, color: PINK,  ax: 0.48, ay: 0.52, fx: 1.1,  fy: 1.7,  px: 0.5, py: 2.2, alpha: 0.75 },
    { cx: 0.2,  cy: 0.8,  r: 0.55, color: MINT,  ax: 0.52, ay: 0.45, fx: 1.6,  fy: 0.8,  px: 1.5, py: 0.8, alpha: 0.75 },
    { cx: 0.5,  cy: 0.1,  r: 0.40, color: BROWN, ax: 0.40, ay: 0.60, fx: 2.3,  fy: 1.4,  px: 3.0, py: 0.3, alpha: 0.20 },
    { cx: 0.1,  cy: 0.5,  r: 0.45, color: PINK,  ax: 0.58, ay: 0.35, fx: 0.9,  fy: 2.1,  px: 0.8, py: 1.8, alpha: 0.65 },
    { cx: 0.9,  cy: 0.5,  r: 0.45, color: MINT,  ax: 0.35, ay: 0.58, fx: 1.7,  fy: 1.3,  px: 2.5, py: 2.8, alpha: 0.65 },
  ];

  let t = 0;

  function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.fillStyle = `rgb(${CREAM[0]},${CREAM[1]},${CREAM[2]})`;
    ctx.fillRect(0, 0, W, H);

    const size = Math.min(W, H);

    blobs.forEach(b => {
      const x = (b.cx + Math.sin(t * b.fx + b.px) * b.ax) * W;
      const y = (b.cy + Math.cos(t * b.fy + b.py) * b.ay) * H;
      const pulse = 1 + Math.sin(t * 2.1 + b.px) * 0.12;
      const r = b.r * size * pulse;

      const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      const [r0, g0, b0] = b.color;
      grad.addColorStop(0,    `rgba(${r0},${g0},${b0},${b.alpha})`);
      grad.addColorStop(0.45, `rgba(${r0},${g0},${b0},${b.alpha * 0.6})`);
      grad.addColorStop(1,    `rgba(${r0},${g0},${b0},0)`);

      ctx.globalCompositeOperation = 'multiply';
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.globalCompositeOperation = 'source-over';
    t += 0.09;
    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
