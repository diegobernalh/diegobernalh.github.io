<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: linear-gradient(135deg, #C0FFEE 0%, #F4B8A5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .text-wrap {
    position: relative;
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(4px, 0.8vw, 8px);
  }

  .brand {
    font-size: clamp(22px, 5vw, 38px);
    font-weight: 800;
    color: #3B2110;
    letter-spacing: -0.01em;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  .tagline {
    font-size: clamp(9px, 1.4vw, 12px);
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(59, 33, 16, 0.45);
    opacity: 0;
    transition: opacity 1s ease 0.4s;
  }

  .brand.visible    { opacity: 1; }
  .tagline.visible  { opacity: 1; }

  .label-c {
    position: fixed;
    bottom: clamp(10px, 2vw, 18px);
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(9px, 1.3vw, 11px);
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(59, 33, 16, 0.3);
    z-index: 3;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="text-wrap">
  <div class="brand" id="brand">Va Bien</div>
  <div class="tagline" id="tagline">AI Barista · specialty coffee</div>
</div>
<div class="label-c">C — Partículas</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }

  window.addEventListener('resize', resize);
  resize();

  const N = 55;

  function mkParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 3 + 1.5,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      alpha: Math.random() * 0.5 + 0.15,
      color: Math.random() > 0.5 ? '59,33,16' : '26,122,94',
    };
  }

  for (let i = 0; i < N; i++) particles.push(mkParticle());

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
      ctx.fill();
    });

    // soft connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 80) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(59,33,16,${0.06 * (1 - dist/80)})`;
          ctx.lineWidth = 0.8;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }

  draw();

  // text fade in
  setTimeout(() => {
    document.getElementById('brand').classList.add('visible');
    document.getElementById('tagline').classList.add('visible');
  }, 800);
</script>
</body>
</html>
